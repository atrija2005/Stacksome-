<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 140" width="680" height="140" role="img" aria-label="Stacksome">
  <defs>
    <linearGradient id="tb2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF4500"/>
      <stop offset="50%"  stop-color="#FF6719"/>
      <stop offset="100%" stop-color="#FFAA55"/>
    </linearGradient>
    <linearGradient id="sh2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bg3" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="680" height="140" fill="#FFFFFF"/>

  <!-- Icon: dark rounded square -->
  <rect x="18" y="18" width="104" height="104" rx="20" fill="#0A0A0A"/>

  <!-- Icon bars -->
  <rect x="30" y="34"  width="80" height="11" rx="3.5" fill="url(#tb2)" filter="url(#bg3)"/>
  <rect x="30" y="34"  width="80" height="5.5" rx="3.5" fill="url(#sh2)"/>
  <rect x="30" y="52"  width="64" height="11" rx="3.5" fill="#FF6719" opacity="0.76"/>
  <rect x="30" y="52"  width="64" height="5"  rx="3.5" fill="url(#sh2)" opacity="0.45"/>
  <rect x="30" y="70"  width="50" height="11" rx="3.5" fill="#FF6719" opacity="0.52"/>
  <rect x="30" y="88"  width="36" height="11" rx="3.5" fill="#FF6719" opacity="0.30"/>
  <rect x="30" y="106" width="22" height="11" rx="3.5" fill="#FF6719" opacity="0.16"/>

  <!-- Wordmark -->
  <text x="148" y="85"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="700" letter-spacing="-2">
    <tspan fill="#0A0A0A">stack</tspan><tspan fill="#FF6719">some</tspan>
  </text>

  <!-- Tagline -->
  <text x="150" y="107"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11" letter-spacing="0.10em"
        fill="rgba(0,0,0,0.30)">PERSONAL SUBSTACK INTELLIGENCE</text>
</svg>
