<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 140" width="680" height="140" role="img" aria-label="Stacksome">
  <defs>
    <linearGradient id="barG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#BB2E00"/>
      <stop offset="30%"  stop-color="#FF4500"/>
      <stop offset="65%"  stop-color="#FF6719"/>
      <stop offset="100%" stop-color="#FFB84D"/>
    </linearGradient>
    <linearGradient id="shG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bloom" x="-14%" y="-130%" width="128%" height="360%">
      <feGaussianBlur stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-10%" y="-80%" width="120%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="ic"><rect x="16" y="14" width="112" height="112" rx="20"/></clipPath>
  </defs>

  <!-- White background -->
  <rect width="680" height="140" fill="#FFFFFF"/>

  <!-- Icon: dark container -->
  <rect x="16" y="14" width="112" height="112" rx="20" fill="#0C0906"/>

  <!-- Ambient glow inside container -->
  <g clip-path="url(#ic)">
    <ellipse cx="72" cy="54" rx="56" ry="44" fill="#FF6719" opacity="0.14"/>

    <!-- Icon bars -->
    <rect x="28" y="28"  width="88" height="12" rx="3.5" fill="url(#barG)" filter="url(#bloom)"/>
    <rect x="28" y="28"  width="88" height="6"  rx="3.5" fill="url(#shG)"/>
    <rect x="28" y="46"  width="72" height="12" rx="3.5" fill="#FF6719" opacity="0.74" filter="url(#glow)"/>
    <rect x="28" y="46"  width="72" height="5.5" rx="3.5" fill="url(#shG)" opacity="0.52"/>
    <rect x="28" y="64"  width="56" height="12" rx="3.5" fill="#FF6719" opacity="0.52"/>
    <rect x="28" y="64"  width="56" height="5"  rx="3.5" fill="url(#shG)" opacity="0.38"/>
    <rect x="28" y="82"  width="40" height="12" rx="3.5" fill="#FF6719" opacity="0.32"/>
    <rect x="28" y="82"  width="40" height="4.5" rx="3.5" fill="url(#shG)" opacity="0.24"/>
    <rect x="28" y="100" width="24" height="12" rx="3.5" fill="#FF6719" opacity="0.16"/>
  </g>

  <!-- Wordmark -->
  <text x="148" y="88"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="700" letter-spacing="-2">
    <tspan fill="#0C0906">stack</tspan><tspan fill="#FF6719">some</tspan>
  </text>

  <!-- Tagline -->
  <text x="150" y="110"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11" letter-spacing="0.10em"
        fill="rgba(0,0,0,0.28)">PERSONAL SUBSTACK INTELLIGENCE</text>
</svg>
