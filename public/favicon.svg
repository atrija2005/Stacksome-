<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0F0F0F"/>
  <!-- Three stacked bars — represents "stack", reads as S at small sizes -->
  <rect x="6" y="8"    width="20" height="5" rx="2.5" fill="#FF6719"/>
  <rect x="6" y="15.5" width="14" height="5" rx="2.5" fill="#FF8C4B"/>
  <rect x="6" y="23"   width="8"  height="5" rx="2.5" fill="#FF6719" opacity="0.45"/>
</svg>
