<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 140" width="680" height="140" role="img" aria-label="Stacksome">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="tb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF4500"/>
      <stop offset="50%"  stop-color="#FF6719"/>
      <stop offset="100%" stop-color="#FFAA55"/>
    </linearGradient>
    <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ag" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="bg2" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c"><rect width="680" height="140" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <rect width="680" height="140" fill="url(#bg)"/>
    <ellipse cx="80" cy="74" rx="68" ry="50" fill="#FF6719" opacity="0.11" filter="url(#ag)"/>

    <!-- Icon bars: x=26, 5 bars, 11px tall, 7px gap, widths: 90 72 56 40 24 -->
    <rect x="26" y="30"  width="90" height="11" rx="3.5" fill="url(#tb)" filter="url(#bg2)"/>
    <rect x="26" y="30"  width="90" height="5.5" rx="3.5" fill="url(#sh)"/>
    <rect x="26" y="48"  width="72" height="11" rx="3.5" fill="#FF6719" opacity="0.74"/>
    <rect x="26" y="48"  width="72" height="5"  rx="3.5" fill="url(#sh)" opacity="0.5"/>
    <rect x="26" y="66"  width="56" height="11" rx="3.5" fill="#FF6719" opacity="0.50"/>
    <rect x="26" y="84"  width="40" height="11" rx="3.5" fill="#FF6719" opacity="0.30"/>
    <rect x="26" y="102" width="24" height="11" rx="3.5" fill="#FF6719" opacity="0.15"/>

    <!-- Divider -->
    <line x1="152" y1="28" x2="152" y2="112" stroke="rgba(255,255,255,.07)" stroke-width="1"/>

    <!-- Wordmark -->
    <text x="174" y="97"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="58" font-weight="700" letter-spacing="-2">
      <tspan fill="#FFFFFF">stack</tspan><tspan fill="#FF6719">some</tspan>
    </text>

    <!-- Tagline -->
    <text x="176" y="118"
          font-family="Arial, Helvetica, sans-serif"
          font-size="11" font-weight="400" letter-spacing="0.12em"
          fill="rgba(255,255,255,0.28)" text-transform="uppercase">PERSONAL SUBSTACK INTELLIGENCE</text>
  </g>
</svg>
