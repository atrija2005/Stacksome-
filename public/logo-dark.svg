<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120" role="img" aria-label="Stacksome" style="background:#0A0A0A;">
  <defs>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6719"/>
      <stop offset="100%" stop-color="#FF9A50"/>
    </linearGradient>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="120" fill="#0A0A0A"/>

  <!-- Icon: stacked bars -->
  <g transform="translate(18, 18)">
    <rect x="0" y="0"  width="60" height="15" rx="5" fill="url(#barGrad2)" filter="url(#glow2)"/>
    <rect x="6" y="22" width="54" height="15" rx="5" fill="#FF6719" opacity="0.72"/>
    <rect x="14" y="44" width="46" height="15" rx="5" fill="#FF6719" opacity="0.42"/>
  </g>

  <!-- Wordmark -->
  <text
    x="102" y="44"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#FFFFFF"
  >stack</text>
  <text
    x="102" y="83"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-1"
    fill="#FF6719"
  >some</text>
</svg>
